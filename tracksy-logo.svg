<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a2e1a"/>
      <stop offset="100%" stop-color="#0f1f0f"/>
    </linearGradient>
  </defs>

  <!-- Arka plan kare -->
  <rect x="50" y="50" width="300" height="300" rx="60" fill="url(#bgGrad)"/>

  <!-- Tracking çizgisi -->
  <polyline
    points="95,260 155,185 195,215 265,120"
    fill="none"
    stroke="#4ade80"
    stroke-width="7"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <!-- Nokta: sol alt -->
  <circle cx="95" cy="260" r="7" fill="#4ade80"/>
  <!-- Nokta: orta sol -->
  <circle cx="155" cy="185" r="7" fill="#4ade80"/>
  <!-- Nokta: orta sağ -->
  <circle cx="195" cy="215" r="7" fill="#4ade80"/>
  <!-- Nokta: sağ üst (büyük, vurgu) -->
  <circle cx="265" cy="120" r="10" fill="#4ade80"/>

  <!-- Ok başı (sağ üst köşe) -->
  <polyline
    points="265,120 265,98 243,98"
    fill="none"
    stroke="#4ade80"
    stroke-width="6"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

</svg>
