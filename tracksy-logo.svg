<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">

  <!-- Arka plan: orta gri -->
  <rect x="0" y="0" width="400" height="400" rx="88" fill="#c8c8c4"/>

  <!-- Dış halka -->
  <circle cx="200" cy="200" r="140" fill="none" stroke="#a8a8a4" stroke-width="1.5"/>
  <circle cx="200" cy="200" r="100" fill="none" stroke="#a8a8a4" stroke-width="1.5"/>
  <circle cx="200" cy="200" r="60" fill="none" stroke="#a8a8a4" stroke-width="1.5"/>

  <!-- Koordinat çizgileri -->
  <line x1="200" y1="60" x2="200" y2="340" stroke="#a8a8a4" stroke-width="1.5"/>
  <line x1="60" y1="200" x2="340" y2="200" stroke="#a8a8a4" stroke-width="1.5"/>

  <!-- Radar dilimi -->
  <path d="M200,200 L200,60 A140,140 0 0,1 323,130 Z" fill="#111111" fill-opacity="0.06"/>

  <!-- Sinyal noktaları -->
  <circle cx="155" cy="145" r="5" fill="#111111" fill-opacity="0.25"/>
  <circle cx="245" cy="170" r="4" fill="#111111" fill-opacity="0.25"/>
  <circle cx="190" cy="230" r="4" fill="#111111" fill-opacity="0.2"/>

  <!-- Merkez -->
  <circle cx="200" cy="200" r="5" fill="#111111"/>

  <!-- Kesik çizgi -->
  <line x1="200" y1="200" x2="270" y2="135" stroke="#111111" stroke-width="1.5" stroke-opacity="0.45" stroke-dasharray="4 4"/>

  <!-- Ana hedef -->
  <circle cx="270" cy="135" r="16" fill="none" stroke="#111111" stroke-width="2.5"/>
  <circle cx="270" cy="135" r="5" fill="#111111"/>

</svg>
